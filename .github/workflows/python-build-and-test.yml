name: Build and Test Python

on:
  push:
    branches: [ "main" ]
    paths: ['python/**']
  pull_request:
    branches: [ "main" ]
    paths: ['python/**']

jobs:
  build:
    # Creates several jobs based on permutations of the parameters in the strategy matrix.
    strategy:
      fail-fast: true
      matrix:
        python-version: [ "3.14" ]
        os: [ windows-latest ]

    runs-on: ${{matrix.os}}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install project
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .
      - name: Install development packages
        run: |
          pip install ruff pytest pytest-cov
      - name: Lint with Ruff
        # Run ruff linter and include E501 which checks for line length.
        run: ruff check --output-format=github --select E501
      - name: Test with pytest
        # Run pytest on the python test folder with coverage generated for the Python sources folder.
        run: |
          pytest --junitxml=junit/test-results.xml --cov=src/python --cov-report=xml --cov-report=html
